<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <filter id="sh"><feDropShadow dx="0" dy="2" stdDeviation="8" flood-color="rgba(0,0,0,0.15)"/></filter>
  </defs>

  <!-- White rounded square background -->
  <rect width="512" height="512" rx="115" ry="115" fill="#ffffff" filter="url(#sh)"/>

  <!-- Calculator body: x=80 y=80 w=352 h=352 → ends at y=432 -->
  <rect x="80" y="80" width="352" height="352" rx="48" ry="48" fill="#c6c6c6"/>

  <!-- Display strip: y=80 to y=168 -->
  <rect x="80" y="80" width="352" height="88" rx="48" ry="48" fill="#a6a6a6"/>
  <rect x="80" y="128" width="352" height="40" fill="#a6a6a6"/>

  <!--
    Buttons area: y=178 to y=422 (inside body which ends at 432)
    4 rows, radius=26, so each slot = 52px
    Total slots: 4×52=208, gaps between: 3×14=42 → 250px
    Start y center: 178+26=204
    Row centers: 204, 270, 336, 402
    Col centers (3 cols): 160, 256, 352
    All circles: x ∈ [134,378] inside [80,432] ✓
    All circles: y ∈ [178,428] inside [80,432] ✓
  -->

  <!-- Row 1 — all dark -->
  <circle cx="160" cy="204" r="26" fill="#3d3d3d"/>
  <circle cx="256" cy="204" r="26" fill="#3d3d3d"/>
  <circle cx="352" cy="204" r="26" fill="#3d3d3d"/>

  <!-- Row 2 — all dark -->
  <circle cx="160" cy="270" r="26" fill="#3d3d3d"/>
  <circle cx="256" cy="270" r="26" fill="#3d3d3d"/>
  <circle cx="352" cy="270" r="26" fill="#3d3d3d"/>

  <!-- Row 3 — 2 dark + 1 orange -->
  <circle cx="160" cy="336" r="26" fill="#3d3d3d"/>
  <circle cx="256" cy="336" r="26" fill="#3d3d3d"/>
  <circle cx="352" cy="336" r="26" fill="#FF9500"/>

  <!-- Row 4 — 1 dark + 2 orange -->
  <circle cx="160" cy="402" r="26" fill="#3d3d3d"/>
  <circle cx="256" cy="402" r="26" fill="#FF9500"/>
  <circle cx="352" cy="402" r="26" fill="#FF9500"/>
</svg>
